<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeLens — AI Job Match Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f4; color: #1c1917; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e7e5e4; padding: 1rem 2rem; display: flex; align-items: center; gap: 0.75rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: 0.8rem; background: #ecfdf5; color: #059669; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e7e5e4; padding: 1.5rem; }
    .card h2 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #78716c; margin-bottom: 1rem; }
    textarea { width: 100%; border: 1px solid #e7e5e4; border-radius: 8px; padding: 0.75rem; font-size: 0.9rem; resize: vertical; min-height: 180px; font-family: inherit; }
    textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .file-drop { border: 2px dashed #e7e5e4; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.15s; color: #78716c; font-size: 0.9rem; }
    .file-drop:hover, .file-drop.drag-over { border-color: #6366f1; color: #4f46e5; }
    .file-drop input { display: none; }
    .divider { text-align: center; color: #a8a29e; font-size: 0.8rem; margin: 0.75rem 0; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; font-size: 0.9rem; color: #44403c; }
    .analyze-btn { width: 100%; margin-top: 1rem; background: #4f46e5; color: #fff; border: none; padding: 0.85rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .analyze-btn:hover { background: #4338ca; }
    .analyze-btn:disabled { background: #c7d2fe; cursor: not-allowed; }
    .results { grid-column: 1 / -1; display: none; }
    .results.visible { display: block; }
    .score-ring { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; }
    .ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-score { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .summary-text { font-size: 1rem; color: #44403c; line-height: 1.6; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.75rem; }
    .tag { padding: 3px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 500; }
    .tag.matched { background: #dcfce7; color: #166534; }
    .tag.missing { background: #fee2e2; color: #991b1b; }
    .list-section { margin-top: 1.25rem; }
    .list-section h3 { font-size: 0.85rem; font-weight: 600; color: #78716c; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
    .list-section ul { list-style: none; }
    .list-section li { padding: 0.4rem 0; border-bottom: 1px solid #f5f5f4; font-size: 0.9rem; display: flex; gap: 0.5rem; }
    .list-section li::before { content: "→"; color: #6366f1; flex-shrink: 0; }
    .cover-letter { background: #fafaf9; border: 1px solid #e7e5e4; border-radius: 8px; padding: 1rem; font-size: 0.9rem; line-height: 1.7; white-space: pre-wrap; margin-top: 1rem; }
    .loading { text-align: center; padding: 2rem; color: #78716c; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e7e5e4; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 0.75rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .container, .results-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
  <h1>ResumeLens</h1>
  <span>AI-Powered</span>
</header>

<div class="container">
  <!-- Resume Input -->
  <div class="card">
    <h2>Your Resume</h2>
    <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" />
      <div>📄 Drop your resume here or click to browse</div>
      <div style="font-size:0.75rem;margin-top:4px">PDF, DOCX, or TXT</div>
    </div>
    <p class="divider">— or paste text below —</p>
    <textarea id="resumeText" placeholder="Paste your resume text here..."></textarea>
  </div>

  <!-- Job Description Input -->
  <div class="card">
    <h2>Job Description</h2>
    <textarea id="jobDesc" placeholder="Paste the full job description here..." style="min-height: 260px;"></textarea>
    <div class="checkbox-row">
      <input type="checkbox" id="coverLetter" />
      <label for="coverLetter">Generate a tailored cover letter</label>
    </div>
    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">Analyze Match →</button>
  </div>

  <!-- Results -->
  <div class="results card" id="results">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div>Analyzing with Claude AI…</div>
    </div>
    <div id="resultContent" style="display:none"></div>
  </div>
</div>

<script src="/static/main.js"></script>
</body>
</html>
